openapi: 3.0.3
info:
  title: Collaborative Board System Workspace API
  description: API for managing boards, columns, cards, and tags
  version: 1.0.0
servers:
  - url: http://localhost:9000/api/v1
    description: Local server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      required:
        - name
        - email
        - phoneNumber
        - password
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        phoneNumber:
          type: string
          example: "+1234567890"
        password:
          type: string
          format: password
          example: "securePassword123"

    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          format: password
          example: "securePassword123"

    Board:
      type: object
      properties:
        title:
          type: string
        description:
          type: string

    Column:
      type: object
      properties:
        boardId:
          type: string
        title:
          type: string
        position:
          type: integer

    Card:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        position:
          type: integer
        columnId:
          type: string

    Tag:
      type: object
      properties:
        name:
          type: string
        boardId:
          type: string

security:
  - bearerAuth: []

paths:
  /user/register:
    post:
      tags:
        - User
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        201:
          description: User registration successful
        409:
          description: Email or phone already used
        500:
          description: Internal server error

  /user/login:
    post:
      tags:
        - User
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        200:
          description: Login successful
        401:
          description: Invalid email or password
        500:
          description: Internal server error

  /boards:
    post:
      tags:
        - Board
      summary: Create a new board
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Board'
      responses:
        201:
          description: Board created successfully
        400:
          description: Title or description missing
        500:
          description: Internal server error
    get:
      tags:
        - Board
      summary: Get all boards for logged-in user
      security:
        - bearerAuth: []
      responses:
        200:
          description: Boards retrieved successfully
        404:
          description: No boards found
        500:
          description: Internal server error

  /boards/{id}:
    patch:
      tags:
        - Board
      summary: Update a board
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Board'
      responses:
        200:
          description: Board updated successfully
        404:
          description: Board not found
        500:
          description: Internal server error
    delete:
      tags:
        - Board
      summary: Delete a board
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Board deleted successfully
        404:
          description: Board not found
        500:
          description: Internal server error

  /column:
    post:
      tags:
        - Column
      summary: Create a column
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Column'
      responses:
        201:
          description: Column created successfully
        400:
          description: Required fields missing
        500:
          description: Internal server error

  /column/{id}:
    patch:
      tags:
        - Column
      summary: Update a column
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Column'
      responses:
        200:
          description: Column updated successfully
        404:
          description: Column not found
        500:
          description: Internal server error
    delete:
      tags:
        - Column
      summary: Delete a column
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                boardId:
                  type: string
      responses:
        200:
          description: Column deleted successfully
        404:
          description: Column not found
        500:
          description: Internal server error

  /card:
    post:
      tags:
        - Card
      summary: Create a card
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Card'
      responses:
        201:
          description: Card created successfully
        400:
          description: Required fields missing
        500:
          description: Internal server error

  /card/{id}:
    patch:
      tags:
        - Card
      summary: Update a card
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                position:
                  type: integer
      responses:
        200:
          description: Card updated successfully
        404:
          description: Card not found
        500:
          description: Internal server error
    delete:
      tags:
        - Card
      summary: Delete a card
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Card deleted successfully
        404:
          description: Card not found
        500:
          description: Internal server error

  /card/column/{columnId}:
    get:
      tags:
        - Card
      summary: Get all cards in a column
      security:
        - bearerAuth: []
      parameters:
        - name: columnId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Cards retrieved successfully
        404:
          description: Column not found
        500:
          description: Internal server error

  /card/{id}/tag:
    post:
      tags:
        - Card
      summary: Assign tag to card
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        200:
          description: Tag assigned successfully
        400:
          description: Tag already assigned or missing
        404:
          description: Card or Tag not found
        500:
          description: Internal server error

  /card/{id}/due-date:
    patch:
      tags:
        - Card
      summary: Set due date for a card
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dueDate:
                  type: string
                  format: date-time
      responses:
        200:
          description: Due date set successfully
        400:
          description: Due date missing
        404:
          description: Card not found
        500:
          description: Internal server error

  /tag:
    post:
      tags:
        - Tag
      summary: Create a tag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tag'
      responses:
        201:
          description: Tag created successfully
        400:
          description: Missing required fields or tag exists
        500:
          description: Internal server error