openapi: 3.0.3
info:
  title: Collaborative Board System Workspace API
  description: API for managing boards, columns, cards, comments, and tags
  version: 1.0.0

servers:
  - url: http://localhost:9000/api/v1
    description: Local server
  - url: https://board-system-backend-project.onrender.com/api/v1
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      required: [name, email, phoneNumber, password]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        phoneNumber:
          type: string
          example: "+1234567890"
        password:
          type: string
          example: password123

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: john@example.com
        password:
          type: string
          example: password123

    Board:
      type: object
      properties:
        title:
          type: string
          example: Project Board
        description:
          type: string
          example: Manage tasks

    Column:
      type: object
      properties:
        boardId:
          type: string
        title:
          type: string
        position:
          type: integer

    Card:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        position:
          type: integer
        columnId:
          type: string
        dueDate:
          type: string
          format: date-time
        __v:
          type: integer
          description: Version field for conflict handling

    Tag:
      type: object
      properties:
        name:
          type: string
        boardId:
          type: string

    Comment:
      type: object
      properties:
        cardId:
          type: string
        content:
          type: string
        parentComment:
          type: string
          nullable: true

security:
  - bearerAuth: []

paths:

  /user/register:
    post:
      tags: [User]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        201:
          description: User registered

  /user/login:
    post:
      tags: [User]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        200:
          description: Login successful

  /boards:
    post:
      tags: [Board]
      summary: Create board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Board'
      responses:
        201:
          description: Board created

    get:
      tags: [Board]
      summary: Get boards (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        200:
          description: Boards retrieved

  /boards/{id}:
    patch:
      tags: [Board]
      summary: Update board
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Board'
      responses:
        200:
          description: Updated

    delete:
      tags: [Board]
      summary: Delete board
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /column:
    post:
      tags: [Column]
      summary: Create column
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Column'
      responses:
        201:
          description: Created

  /card:
    post:
      tags: [Card]
      summary: Create card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Card'
      responses:
        201:
          description: Created

  /card/{id}:
    patch:
      tags: [Card]
      summary: Update card (with conflict handling)
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                position:
                  type: integer
                __v:
                  type: integer
      responses:
        200:
          description: Updated
        409:
          description: Conflict detected

    delete:
      tags: [Card]
      summary: Delete card
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: Deleted

  /card/{id}/move:
    patch:
      tags: [Card]
      summary: Move card
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                columnId:
                  type: string
                position:
                  type: integer
      responses:
        200:
          description: Card moved

  /card/column/{columnId}:
    get:
      tags: [Card]
      summary: Get cards in column
      parameters:
        - in: path
          name: columnId
          required: true
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        200:
          description: Cards retrieved

  /card/{id}/tag:
    post:
      tags: [Card]
      summary: Assign tag
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        200:
          description: Tag assigned

  /card/{id}/due-date:
    patch:
      tags: [Card]
      summary: Set due date
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dueDate:
                  type: string
      responses:
        200:
          description: Due date set

  /comment:
    post:
      tags: [Comment]
      summary: Add comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
      responses:
        201:
          description: Comment added

  /comments/{id}:
    put:
      tags: [Comment]
      summary: Edit comment
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        200:
          description: Updated

  /comments/{commentId}:
    delete:
      tags: [Comment]
      summary: Delete comment
      parameters:
        - in: path
          name: commentId
          required: true
        - in: query
          name: onlyReplies
          schema:
            type: boolean
      responses:
        200:
          description: Deleted

  /comments/card/{cardId}:
    get:
      tags: [Comment]
      summary: Get comments
      parameters:
        - in: path
          name: cardId
          required: true
      responses:
        200:
          description: Comments retrieved

  /tag:
    post:
      tags: [Tag]
      summary: Create tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tag'
      responses:
        201:
          description: Tag created

x-socket-events:
  description: Real-time events via Socket.IO
  events:
    - name: joinBoard
      description: Join board room
    - name: cardCreated
      description: Card created
    - name: cardMoved
      description: Card moved
    - name: commentAdded
      description: Comment added